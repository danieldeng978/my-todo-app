<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#667eea">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>Todo App - 学习全栈</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%23667eea' width='100' height='100' rx='20'/><text x='50' y='65' font-size='50' text-anchor='middle' fill='white'>✅</text></svg>">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>📝 Todo App</h1>
      <p>🎤 学习全栈</p>
    </header>
    
    <div class="stats-bar">
      <div class="stat-item">
        <div class="stat-value" id="totalCount">0</div>
        <div class="stat-label">总计</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="completedCount">0</div>
        <div class="stat-label">已完成</div>
      </div>
      <div class="stat-item">
        <div class="stat-value" id="pendingCount">0</div>
        <div class="stat-label">进行中</div>
      </div>
    </div>
    
    <div class="input-section">
      <input type="text" id="todoInput" placeholder="添加新待办...">
      <button id="addBtn">添加</button>
    </div>
    
    <ul class="todo-list" id="todoList"></ul>
  </div>
  
  <div id="message" class="message"></div>
  
  <script src="app.js"></script>
</body>
</html>
